server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: game-engine-service
          uri: lb://game-engine-service
          predicates:
            - Path=/api/engine/**
          filters:
            - StripPrefix=2

        - id: game-session-service
          uri: lb://game-session-service
          predicates:
            - Path=/api/session/**
          filters:
            - StripPrefix=2

        - id: game-session-ws
          uri: lb://game-session-service
          predicates:
            - Path=/ws/**

        - id: ui-service
          uri: lb://ui-service
          predicates:
            - Path=/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

logging:
  level:
    com.ttt.gateway.filter.LoggingFilter: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info
